<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Vizitkam</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 50px 20px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00fff2; object-fit: cover; }
        h1 { margin: 15px 0 5px 0; font-size: 24px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .link-btn { display: block; background-color: #1f1f1f; color: #00fff2; text-decoration: none; padding: 15px; margin: 10px auto; border-radius: 30px; width: 100%; max-width: 350px; font-weight: bold; border: 1px solid #333; transition: 0.3s; }
        .link-btn:hover { background-color: #00fff2; color: #121212; transform: scale(1.03); }
    </style>
</head>
<body>

    <!-- O'z rasmingiz havolasini bering yoki shu qatorni o'chiring -->
    <img src="https://placeholder.com" alt="Avatar" class="avatar">

    <h1>Ism Familiyangiz</h1>
    <p>O'zingiz haqingizda qisqacha (masalan: Video Maker)</p>

    <!-- Tugmalar va linklar. Havolalarni o'zingiznikiga almashtiring -->
    <a href="https://t.me" class="link-btn" target="_blank">Telegram Kanalim</a>
    <a href="https://instagram.com" class="link-btn" target="_blank">Instagram</a>
    <a href="https://youtube.com" class="link-btn" target="_blank">YouTube</a>

</body>
</html>
